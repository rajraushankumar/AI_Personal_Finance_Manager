<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

</head>

<body>

    <h1>👤 My Profile</h1>

    <h2>Welcome, {{ username }}</h2>

    <form method="POST" enctype="multipart/form-data">

        <label>Upload Profile Photo</label>

        <br><br>

        <input
            type="file"
            name="profile_photo"
            accept="image/*"
            required>

        <br><br>

        <button type="submit">

            Upload Photo

        </button>

    </form>

    <br>

    <a href="/dashboard">

        ⬅ Back to Dashboard

    </a>

</body>

</html>
